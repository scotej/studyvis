name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  # release-prep pushes the tag with GITHUB_TOKEN, which can't fire the push
  # trigger above (GitHub's recursive-workflow guard), so it dispatches this
  # workflow on the tag ref instead — which requires this trigger to exist.
  workflow_dispatch:

# See ci.yml's pinning note: third-party actions are SHA-pinned because this
# workflow mints the unsigned installers friends manually install. The
# publish job re-declares the contents: write it needs.
permissions:
  contents: read

jobs:
  # #47 F1/F2 — fail fast before any build minutes are spent:
  #   - workflow_dispatch defaults to main, and 'main' flowing into
  #     tauri-action's tagName would mint a "StudyVis main" release;
  #   - a v* tag over stale version files ships installers named after the
  #     OLD version (scripts/check-version-lockstep.sh guards all five);
  #   - the draft body must carry this version's CHANGELOG section — the
  #     Releases page IS the update channel friends read to decide whether
  #     to re-install, and the old static body had zero actual notes.
  preflight:
    name: Tag / version / changelog preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release-body: ${{ steps.notes.outputs.body }}
    steps:
      - uses: actions/checkout@v6

      - name: Assert this run is on a release tag
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::error::Release must run on a vX.Y.Z tag ref, got '$GITHUB_REF'. Dispatch it on the tag, not a branch."
            exit 1
          fi
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::tag '$GITHUB_REF_NAME' is not vX.Y.Z (optionally -prerelease)"
            exit 1
          fi

      - name: Assert the tag matches all five version files
        run: bash scripts/check-version-lockstep.sh "${GITHUB_REF_NAME#v}"

      # X6 — an unsigned update artifact is worse than no release: it uploads
      # fine, publishes fine, and then every installed client silently refuses
      # it. Catch the missing secret here rather than an hour of build minutes
      # later. Only presence is checked; the value never reaches the log.
      - name: Assert the updater signing key is configured
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${KEY}" ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set. Update artifacts would ship unsigned and every client would reject them. Add the secret (see PLAN §8) and re-run."
            exit 1
          fi

      - name: Extract this version's CHANGELOG section for the release body
        id: notes
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          # Shared with release-prep's gate (scripts/changelog-section.sh)
          # so the two checks cannot drift — see the script header.
          section=$(bash scripts/changelog-section.sh "$ver" \
            "Write the release notes on main, re-tag, and re-run — the Releases page is the update channel.")
          boiler='Friends-only release — the macOS app is ad-hoc signed (not notarized);
          the Windows installer is unsigned. See INSTALL.md for first-run steps:
          macOS users right-click the app and choose Open the first time;
          Windows users click "More info" → "Run anyway" on the SmartScreen warning.

          If you are already on StudyVis 1.5.0 or newer, you do not need to download
          anything — the app picks this up on its own and offers to restart into it.
          Auto-update reads `latest.json` from the LATEST published release, so this
          draft has to be published before anyone receives it.'
          {
            echo "body<<CHANGELOG_SECTION_EOF"
            printf '%s\n\n---\n\n%s\n' "$section" "$boiler"
            echo "CHANGELOG_SECTION_EOF"
          } >> "$GITHUB_OUTPUT"

  publish:
    name: ${{ matrix.label }}
    needs: preflight
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # X6 — serialized deliberately. Both jobs append their platform's entry
      # to the SAME `latest.json` on the release, and tauri-action does that
      # as a read-merge-write with no locking: run in parallel and the slower
      # job can overwrite the faster one's entry, silently stranding a whole
      # platform on the old version with no error anywhere. Serializing costs
      # one build's wall-clock on a workflow that runs a few times a year.
      max-parallel: 1
      matrix:
        include:
          # Per-arch, not universal: the llama-server sidecar (externalBin)
          # + its runtime libs + the Rust TARGET_TRIPLE cfg are all per-arch
          # (aarch64/x86_64). A universal target needs a non-existent
          # `llama-server-universal-apple-darwin`; building each arch
          # separately matches what the codebase + fetch script support.
          - label: macOS (Apple Silicon)
            platform: macos-latest
            rust-targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
            llama-triples: aarch64-apple-darwin
          # X6 — NSIS, not MSI. The updater re-runs the installer to apply an
          # update, and an MSI needs msiexec elevation every single time,
          # which turns "auto-update" into a UAC prompt per release. NSIS
          # installs per-user (bundle.windows.nsis.installMode) and supports
          # the passive install mode the updater config asks for, so the
          # update applies with a progress bar and no interaction.
          - label: Windows
            platform: windows-latest
            rust-targets: ''
            args: --bundles nsis
            llama-triples: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master; the toolchain input selects the channel
        with:
          # With a master pin the ref no longer selects the toolchain; this
          # input does.
          toolchain: stable
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch llama-server prebuilds
        shell: bash
        run: |
          for t in ${{ matrix.llama-triples }}; do
            bash scripts/fetch-llama-server.sh --triple "$t"
          done

      - name: Build & publish via tauri-action
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # X6 — the minisign keypair that signs update artifacts. This is
          # NOT Apple/Windows code signing: it's the updater's own integrity
          # chain, verified in-app against `plugins.updater.pubkey`. Without
          # these two the bundler emits unsigned artifacts and every client
          # rejects the update, so the build fails loudly instead (below).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'StudyVis ${{ github.ref_name }}'
          # #47 F2 — this version's CHANGELOG section + the install
          # boilerplate, assembled by the preflight job.
          releaseBody: ${{ needs.preflight.outputs.release-body }}
          releaseDraft: true
          # Tags with a prerelease suffix (e.g. v1.1.0-rc.1) publish as GitHub
          # prereleases; clean vX.Y.Z tags are full releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          # X6 — both matrix jobs write `latest.json` on the same release;
          # tauri-action merges each platform's entry into the existing file
          # rather than overwriting it, so the published release ends up with
          # both darwin-aarch64 and windows-x86_64.
          includeUpdaterJson: true
          args: ${{ matrix.args }}
