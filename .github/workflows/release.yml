name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  # release-prep pushes the tag with GITHUB_TOKEN, which can't fire the push
  # trigger above (GitHub's recursive-workflow guard), so it dispatches this
  # workflow on the tag ref instead — which requires this trigger to exist.
  workflow_dispatch:

# See ci.yml's pinning note: third-party actions are SHA-pinned because this
# workflow mints the unsigned installers friends manually install. The
# publish job re-declares the contents: write it needs.
permissions:
  contents: read

jobs:
  # #47 F1/F2 — fail fast before any build minutes are spent:
  #   - workflow_dispatch defaults to main, and 'main' flowing into
  #     tauri-action's tagName would mint a "StudyVis main" release;
  #   - a v* tag over stale version files ships installers named after the
  #     OLD version (scripts/check-version-lockstep.sh guards all five);
  #   - the draft body must carry this version's CHANGELOG section — the
  #     Releases page IS the update channel friends read to decide whether
  #     to re-install, and the old static body had zero actual notes.
  preflight:
    name: Tag / version / changelog preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release-body: ${{ steps.notes.outputs.body }}
    steps:
      - uses: actions/checkout@v6

      - name: Assert this run is on a release tag
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::error::Release must run on a vX.Y.Z tag ref, got '$GITHUB_REF'. Dispatch it on the tag, not a branch."
            exit 1
          fi
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::tag '$GITHUB_REF_NAME' is not vX.Y.Z (optionally -prerelease)"
            exit 1
          fi

      - name: Assert the tag matches all five version files
        run: bash scripts/check-version-lockstep.sh "${GITHUB_REF_NAME#v}"

      - name: Extract this version's CHANGELOG section for the release body
        id: notes
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          # Shared with release-prep's gate (scripts/changelog-section.sh)
          # so the two checks cannot drift — see the script header.
          section=$(bash scripts/changelog-section.sh "$ver" \
            "Write the release notes on main, re-tag, and re-run — the Releases page is the update channel.")
          boiler='Friends-only release — the macOS app is ad-hoc signed (not notarized);
          the Windows installer is unsigned. See INSTALL.md for first-run steps:
          macOS users right-click the app and choose Open the first time;
          Windows users click "More info" → "Run anyway" on the SmartScreen warning.

          StudyVis does not auto-update. Download a new version here when one drops.'
          {
            echo "body<<CHANGELOG_SECTION_EOF"
            printf '%s\n\n---\n\n%s\n' "$section" "$boiler"
            echo "CHANGELOG_SECTION_EOF"
          } >> "$GITHUB_OUTPUT"

  publish:
    name: ${{ matrix.label }}
    needs: preflight
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Per-arch, not universal: the llama-server sidecar (externalBin)
          # + its runtime libs + the Rust TARGET_TRIPLE cfg are all per-arch
          # (aarch64/x86_64). A universal target needs a non-existent
          # `llama-server-universal-apple-darwin`; building each arch
          # separately matches what the codebase + fetch script support.
          - label: macOS (Apple Silicon)
            platform: macos-latest
            rust-targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
            llama-triples: aarch64-apple-darwin
          - label: Windows
            platform: windows-latest
            rust-targets: ''
            args: --bundles msi
            llama-triples: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master; the toolchain input selects the channel
        with:
          # With a master pin the ref no longer selects the toolchain; this
          # input does.
          toolchain: stable
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch llama-server prebuilds
        shell: bash
        run: |
          for t in ${{ matrix.llama-triples }}; do
            bash scripts/fetch-llama-server.sh --triple "$t"
          done

      - name: Build & publish via tauri-action
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'StudyVis ${{ github.ref_name }}'
          # #47 F2 — this version's CHANGELOG section + the install
          # boilerplate, assembled by the preflight job.
          releaseBody: ${{ needs.preflight.outputs.release-body }}
          releaseDraft: true
          # Tags with a prerelease suffix (e.g. v1.1.0-rc.1) publish as GitHub
          # prereleases; clean vX.Y.Z tags are full releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}
