name: Claude PR Review

on:
  pull_request:
      types: [opened]

      jobs:
        claude-review:
            runs-on: ubuntu-latest
                permissions:
                      contents: read
                            pull-requests: write

                                steps:
                                      - name: Checkout repository
                                              uses: actions/checkout@v4
                                                      with:
                                                                fetch-depth: 0

                                                                      - name: Get first commit SHA
                                                                              id: first-commit
                                                                                      run: |
                                                                                                FIRST_SHA=$(git log --reverse origin/${{ github.base_ref }}..HEAD | head -1 | awk '{print $2}')
                                                                                                          echo "sha=$FIRST_SHA" >> $GITHUB_OUTPUT
                                                                                                          
                                                                                                                - name: Review PR with Claude
                                                                                                                        uses: anthropics/claude-code-action@beta
                                                                                                                                with:
                                                                                                                                          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
                                                                                                                                                    direct_prompt: |
                                                                                                                                                                You are a senior code reviewer. Please review the changes introduced in this pull request.
                                                                                                                                                                            Focus only on the first commit: ${{ steps.first-commit.outputs.sha }}
                                                                                                                                                                            
                                                                                                                                                                                        Please evaluate:
                                                                                                                                                                                                    1. Code quality and clarity
                                                                                                                                                                                                                2. Potential bugs or logic errors
                                                                                                                                                                                                                            3. Security concerns
                                                                                                                                                                                                                                        4. Performance implications
                                                                                                                                                                                                                                                    5. Adherence to best practices
                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                Provide constructive, specific feedback. Post your review as a comment on this PR.
