name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check .

      - name: Test
        run: npm test

      - name: Type-check + Vite build
        run: npm run build

      - name: Storybook build
        run: npm run build-storybook

      # V3-P7 — Install only the Chromium browser test-storybook needs.
      # Default `npx playwright install` would pull Firefox + WebKit too,
      # roughly tripling the download. The runner only spins up Chromium.
      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Accessibility audit (axe-core over every Storybook story)
        run: npm run check-a11y

      - name: Token enforcement
        run: npm run check-tokens

      - name: Strings-module enforcement
        run: npm run check-strings

      - name: Contrast audit (WCAG AA over token pairs, both themes)
        run: npm run check-contrast

  rust:
    name: Rust
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # tauri.conf.json's bundle.externalBin entry requires the file to exist
      # on disk during the cargo build script (V2-P1). The Rust job runs on
      # macos-latest which is Apple Silicon, so the host triple matches the
      # only one we need for cargo check.
      - name: Fetch llama-server prebuild
        run: bash scripts/fetch-llama-server.sh --triple aarch64-apple-darwin

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --locked

      - name: cargo clippy (correctness only)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -A clippy::all -D clippy::correctness

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --locked
