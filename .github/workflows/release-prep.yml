name: Release prep

# One-click release cutting. Bumps the version across all five tracked files,
# commits + tags on main, and kicks off the Release build (which produces a
# draft GitHub Release for you to review and publish). Run from the Actions tab.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump'
        type: choice
        options: [patch, minor, major, custom]
        default: patch
      custom_version:
        description: 'Exact version, e.g. 1.2.0 (only used when bump = custom)'
        type: string
        default: ''

permissions:
  contents: write # push the bump commit + tag to main
  actions: write # dispatch release.yml

concurrency:
  group: release-prep
  cancel-in-progress: false

jobs:
  # Quality gate over main before anything is bumped, committed, tagged, or
  # pushed. rustfmt is the only Rust check here — no compilation, so the
  # ubuntu runner needs no llama-server prebuild.
  gate:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      verified-sha: ${{ steps.ci-check.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Type-check + Vite build
        run: npm run build

      - name: Token enforcement
        run: npm run check-tokens

      - name: Strings-module enforcement
        run: npm run check-strings

      - name: Contrast (WCAG AA) enforcement
        run: npm run check-contrast

      # PR-19 — the a11y gate (a CLAUDE.md quality gate that ci.yml runs) was
      # missing here, so a release could be cut over an axe-core regression.
      - name: Storybook build
        run: npm run build-storybook

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Accessibility audit (axe-core over every Storybook story)
        run: npm run check-a11y

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check

      # PR-19 — compiling the Rust targets (both macOS + Windows legs) on this
      # ubuntu gate is impractical, and shipping a release over a clippy or
      # cargo-test failure the pre-commit hook can silently miss is the exact
      # gap this closes. Require that CI (which DOES compile/clippy/test both
      # host targets and runs check-a11y) has gone green on the precise main SHA
      # being tagged, so the irreversible bump+tag+push can't outrun it.
      - name: Require CI success on this main commit
        id: ci-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sha=$(git rev-parse HEAD)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Requiring a successful CI run for main @ $sha"
          run=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=$sha&per_page=1" \
            --jq '.workflow_runs[0] | "\(.status):\(.conclusion)"' 2>/dev/null || echo "none")
          echo "CI run for $sha: $run"
          if [ "$run" != "completed:success" ]; then
            echo "::error::CI has not passed on main @ $sha (got '$run'). Push the fix, wait for CI to go green, then re-run Release prep."
            exit 1
          fi

  prep:
    name: Bump, tag, trigger build
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      # Pin the release to the EXACT SHA the gate verified. `ref: main` above
      # can resolve to a newer commit if main advanced between the gate and prep
      # checkouts, which would bump+tag+release code CI never approved (TOCTOU).
      # Fail fast rather than release an unverified commit; the user re-runs
      # Release prep, which re-gates the new HEAD.
      - name: Verify checkout matches gate-verified SHA
        run: |
          set -euo pipefail
          head=$(git rev-parse HEAD)
          verified='${{ needs.gate.outputs.verified-sha }}'
          echo "prep HEAD: $head; gate-verified: $verified"
          if [ "$head" != "$verified" ]; then
            echo "::error::main advanced since the gate verified $verified (now $head). Re-run Release prep."
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Compute next version
        id: ver
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          CUSTOM_VERSION: ${{ inputs.custom_version }}
        run: |
          set -euo pipefail
          current=$(node -p "require('./package.json').version")
          IFS='.' read -r MA MI PA <<< "$current"
          case "$RELEASE_TYPE" in
            major)  NEW="$((MA + 1)).0.0" ;;
            minor)  NEW="${MA}.$((MI + 1)).0" ;;
            patch)  NEW="${MA}.${MI}.$((PA + 1))" ;;
            custom) NEW="$CUSTOM_VERSION" ;;
            *)      echo "::error::unknown release_type '$RELEASE_TYPE'"; exit 1 ;;
          esac
          if [[ ! "$NEW" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::computed version '$NEW' is not X.Y.Z (custom needs a value)"; exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v$NEW" >/dev/null 2>&1; then
            echo "::error::tag v$NEW already exists on origin"; exit 1
          fi
          echo "Bumping $current -> $NEW"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Bump version in all five files
        env:
          NEW: ${{ steps.ver.outputs.new }}
        run: |
          set -euo pipefail
          # package.json + package-lock.json (both lock entries) in one shot.
          npm version "$NEW" --no-git-tag-version --allow-same-version
          # tauri.conf.json: the single top-level "version".
          perl -0pi -e 's/("version":\s*)"[^"]*"/$1"$ENV{NEW}"/' src-tauri/tauri.conf.json
          # Cargo.toml: only the version inside the [package] table.
          perl -0pi -e 's/(\[package\][^\[]*?\nversion\s*=\s*)"[^"]*"/$1"$ENV{NEW}"/s' src-tauri/Cargo.toml
          # Cargo.lock: the studyvis package's own entry.
          perl -0pi -e 's/(name = "studyvis"\nversion = )"[^"]*"/$1"$ENV{NEW}"/' src-tauri/Cargo.lock
          echo "Changed files:" && git --no-pager diff --name-only

      - name: Commit, tag, push
        env:
          NEW: ${{ steps.ver.outputs.new }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json \
                  src-tauri/Cargo.toml src-tauri/tauri.conf.json src-tauri/Cargo.lock
          git commit -m "chore(release): v$NEW"
          git tag -a "v$NEW" -m "StudyVis v$NEW"
          git push origin main
          git push origin "v$NEW"

      - name: Trigger Release build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW: ${{ steps.ver.outputs.new }}
        run: |
          set -euo pipefail
          # The tag push above used GITHUB_TOKEN, so it did not fire release.yml's
          # push trigger. Dispatch it explicitly on the new tag ref. Retry: the
          # ref can lag a beat behind the push.
          for attempt in 1 2 3; do
            if gh workflow run release.yml --ref "v$NEW"; then
              echo "Dispatched release.yml on v$NEW"; exit 0
            fi
            echo "Attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "::error::could not dispatch release.yml; the tag v$NEW is pushed — run Release manually on it"
          exit 1

      - name: Summary
        if: always()
        env:
          NEW: ${{ steps.ver.outputs.new }}
        run: |
          {
            echo "### Release prep: v${NEW:-?}"
            echo ""
            echo "- Bumped version to **v${NEW}** and pushed tag \`v${NEW}\` to main"
            echo "- Triggered the **Release** build (draft GitHub Release)"
            echo ""
            echo "Review and publish the draft once the build finishes:"
            echo "<https://github.com/${{ github.repository }}/releases>"
          } >> "$GITHUB_STEP_SUMMARY"
