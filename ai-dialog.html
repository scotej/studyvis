<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>StudyVis · Ask the AI</title>
    <script>
      // Mirror of the boot script in index.html — keep the AI dialog window
      // in sync with the main window's theme decision before first paint.
      // Missing cache falls back to 'dark' to match DEFAULT_SETTINGS.theme;
      // change both together if the app default ever moves.
      ;(function () {
        try {
          var stored = window.localStorage.getItem('studyvis.theme')
          var mode =
            stored === 'light' || stored === 'dark' || stored === 'auto'
              ? stored
              : 'dark'
          var systemLight =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: light)').matches
          var resolved =
            mode === 'auto' ? (systemLight ? 'light' : 'dark') : mode
          if (resolved === 'light') {
            document.documentElement.classList.add('light')
          }
          document.documentElement.dataset.theme = resolved
        } catch (_e) {
          // Fall through to CSS default; React will reconcile after mount.
        }
      })()
      // V3-P7 — Mirror of index.html's reduced-motion boot script. Both
      // Tauri windows share the same origin (and therefore the same
      // localStorage), so this picks up the value the main window wrote.
      ;(function () {
        try {
          var stored =
            window.localStorage.getItem('studyvis.reduceMotion') === 'true'
          var osPrefers =
            window.matchMedia &&
            window.matchMedia('(prefers-reduced-motion: reduce)').matches
          document.documentElement.dataset.reduceMotion =
            stored || osPrefers ? 'true' : 'false'
        } catch (_e) {
          // Fall through to motion enabled — React reconciles after mount.
        }
      })()
    </script>
    <style>
      html,
      body {
        background: transparent;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/features/ai/ai-dialog-main.tsx"></script>
  </body>
</html>
